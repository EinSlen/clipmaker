services:
  - type: web
    name: clipmaker-sad
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOSTNAME
        value: 0.0.0.0
      - key: PYTHON_BIN
        value: python3
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    autoDeploy: true
